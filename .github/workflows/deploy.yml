name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token with the scopes the Pages deploy actually needs.
# The missing id-token/pages permissions are what caused the 401 on the
# auto-generated legacy workflow.
permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight deploy; queue them so rapid pushes don't race
# (the race is what desynced the deploy token before).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
